<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TANA ENGINEERING PLC - EMS{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'assets/css/tailwind.css' %}" rel="stylesheet">

    <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #f7f9fc, #eef2f7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #ffffff;
      padding: 2rem 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
    }

    .login-box h2 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: #f9fafb;
      transition: border 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #2563eb;
      outline: none;
      background: #fff;
    }

    .error {
      color: #dc2626;
      font-size: 0.9rem;
    }

    button {
      padding: 0.75rem;
      background: #2563eb;
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #1e40af;
    }

    .forgot {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .forgot a {
      color: #2563eb;
      text-decoration: none;
      transition: color 0.3s;
    }

    .forgot a:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }
  </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans">
    <!-- Main content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
