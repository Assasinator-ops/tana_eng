{% extends "base.html" %}
{% block content %}
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Owners Dashboard</h2>
        <a href="{% url 'owner-create' %}" class="bg-blue-600 text-white px-4 py-2 rounded">Add New Owner</a>
    </div>
    <div class="bg-white shadow rounded-lg mb-8 p-4 overflow-x-auto">
      <h2 class="text-xl font-semibold mb-4">Registered Owners</h2>
      <table class="datatable min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-2 text-left text-sm font-medium text-gray-500 uppercase tracking-wider">ID</th>
            <th class="px-4 py-2 text-left text-sm font-medium text-gray-500 uppercase tracking-wider">Name</th>
            <th class="px-4 py-2 text-left text-sm font-medium text-gray-500 uppercase tracking-wider">Email</th>
            <th class="px-4 py-2 text-left text-sm font-medium text-gray-500 uppercase tracking-wider">Phone</th>
            <th class="px-4 py-2 text-left text-sm font-medium text-gray-500 uppercase tracking-wider">Address</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          {% for owner in owners %}
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-700">{{ owner.id }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-700"><a href="{% url 'owner-detail-page' owner.id %}" class="text-gray-800 hover:underline">{{ owner.name }}</a></td>
            <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-700">{{ owner.email }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-700">{{ owner.phone1 }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-700">{{ owner.address }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
