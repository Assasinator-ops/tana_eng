{% extends "base.html" %}
{% load rest_framework %}
{% block content %}
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8">

            <h1 class="text-3xl font-extrabold text-center text-gray-900 mb-8">
                Create New Owner
            </h1>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                {% render_form serializer %}
                <div class="flex justify-center">
                    <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow">
                        Create Owner
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'owner-list' %}" class="text-blue-600 hover:underline">Back to Owner List</a>
            </div>

        </div>
    </div>
{% endblock %}
